apiVersion: apps/v1
kind: Deployment
metadata:
  name: civic-os-kb
  labels:
    app: civic-os-kb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: civic-os-kb
  template:
    metadata:
      labels:
        app: civic-os-kb
    spec:
      containers:
        - name: kb-server
          image: registry.digitalocean.com/civic-os/kb-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: KB_PORT
              value: "8080"
            - name: KB_BUNDLE_DIR
              value: /data/knowledge/bundle
          envFrom:
            - secretRef:
                name: civic-os-kb-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
