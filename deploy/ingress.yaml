apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: civic-os-kb
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kb.civic-os.org
      secretName: civic-os-kb-tls
  rules:
    - host: kb.civic-os.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: civic-os-kb
                port:
                  number: 8080
